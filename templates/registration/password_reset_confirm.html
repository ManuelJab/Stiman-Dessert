{% extends 'base.html' %}
{% load static %}
{% block title %}Cambiar contraseña{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
<style>
  .reset-confirm { max-width: 520px; margin: 120px auto 40px; }
  .reset-card { background:#fff; border-radius:16px; box-shadow:0 16px 36px rgba(0,0,0,0.12); overflow:hidden; }
  .reset-header { background: linear-gradient(135deg, #ff4081, #e91e63); color:#fff; padding: 18px 22px; }
  .reset-header h1 { margin:0; font-size: 26px; font-weight:700; }
  .reset-body { padding: 22px; }
  .reset-actions { display:flex; justify-content:space-between; align-items:center; gap:16px; margin-top: 10px; }
  .link-cta { color:#e91e63; font-weight:600; text-decoration:none; }
  .link-cta:hover { text-decoration:underline; color:#c2185b; }
</style>
{% endblock %}
{% block content %}
  <div class="reset-confirm">
    <section class="reset-card">
      <div class="reset-header">
        <h1>Establecer nueva contraseña</h1>
      </div>
      <div class="reset-body">
        <form method="post" class="auth-form" novalidate>
          {% csrf_token %}
          {{ form.as_p }}
          <div class="reset-actions">
            <a class="link-cta" href="{% url 'login' %}">← Volver a iniciar sesión</a>
            <button type="submit" class="auth-button">Cambiar contraseña</button>
          </div>
        </form>
      </div>
    </section>
  </div>
{% endblock %}
