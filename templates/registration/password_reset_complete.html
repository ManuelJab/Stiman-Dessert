{% extends 'base.html' %}
{% load static %}
{% block title %}Contraseña actualizada{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
<style>
  .reset-complete { max-width: 720px; margin: 120px auto 40px; padding: 0 16px; }
  .complete-card { background:#fff; border-radius:16px; box-shadow:0 16px 36px rgba(0,0,0,0.12); overflow:hidden; }
  .complete-header { background: linear-gradient(135deg, #ff4081, #e91e63); color:#fff; padding: 18px 22px; }
  .complete-header h1 { margin:0; font-size: 26px; font-weight:700; }
  .complete-body { padding: 22px; color:#444; }
  .complete-body p { margin: 0 0 10px; }
  .link-cta { color:#e91e63; font-weight:600; text-decoration:none; }
  .link-cta:hover { text-decoration:underline; color:#c2185b; }
</style>
{% endblock %}
{% block content %}
  <div class="reset-complete">
    <section class="complete-card">
      <div class="complete-header">
        <h1>Contraseña actualizada</h1>
      </div>
      <div class="complete-body">
        <p>Tu contraseña fue cambiada correctamente.</p>
        <p><a class="link-cta" href="{% url 'login' %}">Iniciar sesión</a></p>
      </div>
    </section>
  </div>
{% endblock %}
